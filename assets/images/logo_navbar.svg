<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <!-- Golden Sweeping Base Foundation -->
    <path d="M15,102 Q60,92 105,102 Q60,96 15,102 Z" fill="#C9A84C"/>
    <path d="M25,97 Q60,89 95,97 Q60,92 25,97 Z" fill="#E8C96C"/>

    <!-- Left Tall Minaret -->
    <g id="minaret-left">
        <!-- Base pedestal -->
        <rect x="22" y="60" width="8" height="36" fill="#FFFFFF" rx="1"/>
        <rect x="20" y="56" width="12" height="4" fill="#C9A84C" rx="0.5"/>
        <rect x="23" y="35" width="6" height="21" fill="#FFFFFF"/>
        <!-- Balcony -->
        <rect x="21" y="32" width="10" height="3" fill="#C9A84C" rx="0.5"/>
        <!-- Upper pillar -->
        <rect x="24" y="20" width="4" height="12" fill="#FFFFFF"/>
        <rect x="22" y="18" width="8" height="2" fill="#C9A84C"/>
        <!-- Spire roof -->
        <path d="M22,18 L26,6 L30,18 Z" fill="#C9A84C"/>
        <!-- Crescent on minaret -->
        <path d="M26,3 C24.5,3 23.5,4 23.5,5.5 C23.5,6.5 24.2,7.2 25.1,7.4 C24.5,6.8 24.5,5.5 25.5,5 C26.1,4.7 26.7,4.7 27.2,5 C27.1,3.8 26.5,3 26,3 Z" fill="#C9A84C"/>
    </g>

    <!-- Right Tall Minaret (Exact Mirror of Left) -->
    <g id="minaret-right">
        <!-- Base pedestal -->
        <rect x="90" y="60" width="8" height="36" fill="#FFFFFF" rx="1"/>
        <rect x="88" y="56" width="12" height="4" fill="#C9A84C" rx="0.5"/>
        <rect x="91" y="35" width="6" height="21" fill="#FFFFFF"/>
        <!-- Balcony -->
        <rect x="89" y="32" width="10" height="3" fill="#C9A84C" rx="0.5"/>
        <!-- Upper pillar -->
        <rect x="92" y="20" width="4" height="12" fill="#FFFFFF"/>
        <rect x="90" y="18" width="8" height="2" fill="#C9A84C"/>
        <!-- Spire roof -->
        <path d="M90,18 L94,6 L98,18 Z" fill="#C9A84C"/>
        <!-- Crescent on minaret -->
        <path d="M94,3 C92.5,3 91.5,4 91.5,5.5 C91.5,6.5 92.2,7.2 93.1,7.4 C92.5,6.8 92.5,5.5 93.5,5 C94.1,4.7 94.7,4.7 95.2,5 C95.1,3.8 94.5,3 94,3 Z" fill="#C9A84C"/>
    </g>

    <!-- Main Central Mosque Building & Majestic Dome -->
    <g id="main-mosque">
        <!-- Main Building Structure -->
        <rect x="34" y="65" width="52" height="31" fill="#FFFFFF" rx="2"/>
        <path d="M32,65 L88,65 L86,60 L34,60 Z" fill="#C9A84C"/>
        
        <!-- Elegant Main Archway (Entrance) -->
        <path d="M48,96 L48,78 C48,70 52,66 60,66 C68,66 72,70 72,78 L72,96 Z" fill="#C9A84C"/>
        <path d="M51,96 L51,78 C51,73 54,70 60,70 C66,70 69,73 69,78 L69,96 Z" fill="#122B25"/>
        
        <!-- Side Windows -->
        <path d="M39,88 L39,78 C39,75 41,73 43,73 C45,73 47,75 47,78 L47,88 Z" fill="#C9A84C"/>
        <path d="M73,88 L73,78 C73,75 75,73 77,73 C79,73 81,75 81,78 L81,88 Z" fill="#C9A84C"/>

        <!-- Majestic Central Dome -->
        <path d="M38,60 C38,38 50,26 60,22 C70,26 82,38 82,60 Z" fill="#FFFFFF"/>
        <!-- Dome Golden Ribs / Pattern -->
        <path d="M38,60 C38,38 50,26 60,22 C70,26 82,38 82,60 Z" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
        <path d="M46,60 C48,45 53,32 60,22 C67,32 72,45 74,60" fill="none" stroke="#C9A84C" stroke-width="2"/>
        <path d="M53,60 C55,48 58,35 60,22 C62,35 65,48 67,60" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
        <!-- Dome Base Collar -->
        <rect x="36" y="58" width="48" height="4" fill="#C9A84C" rx="1"/>

        <!-- Spire & Finial on top of Dome -->
        <rect x="58.5" y="12" width="3" height="10" fill="#C9A84C"/>
        <!-- Giant Golden Crescent Moon at Apex -->
        <path d="M60,2 C55,2 51,6 51,11 C51,14.8 53.5,18.1 57,19.3 C55,17.5 54.8,14.5 56.5,12.5 C57.8,11 60,10.8 61.8,11.8 C61.2,8.8 59.5,6.5 60,2 Z" fill="#C9A84C"/>
    </g>
</svg>
